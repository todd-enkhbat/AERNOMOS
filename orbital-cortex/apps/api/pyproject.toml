# Tool config only; the API installs from requirements.txt.

[tool.ruff]
line-length = 100
target-version = "py39"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = [
  "E402", # tests set env vars before app imports by design
]

[tool.ruff.lint.per-file-ignores]
# Long data rows / message strings that predate the lint config.
"app/services/tle_cache.py" = ["E501"]
"app/routing/scorer.py" = ["E501"]
"app/services/scenes.py" = ["E501"]

[tool.mypy]
python_version = "3.9"
ignore_missing_imports = true
check_untyped_defs = true
no_implicit_optional = true
warn_unused_ignores = false
exclude = ["migrations/"]

[tool.pytest.ini_options]
testpaths = ["tests"]
