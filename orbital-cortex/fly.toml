# fly.toml app configuration file generated for orbital-cortex-api on 2026-07-05T04:15:39-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'orbital-cortex-api'
primary_region = 'ewr'

[build]
  dockerfile = 'apps/api/Dockerfile'

[deploy]
  release_command = 'alembic upgrade head'

[env]
  APP_ENV = 'production'
  PORT = '8000'

[processes]
  app = 'uvicorn app.main:app --host 0.0.0.0 --port 8000'
  worker = 'arq app.workers.executor.WorkerSettings'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  # Only the web process serves HTTP; the worker has no HTTP port.
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '20s'
    method = 'GET'
    path = '/readyz'

# Keep the ARQ worker running so queued jobs are processed (workers do not
# receive HTTP traffic and otherwise auto-stop when idle).
[[restart]]
  policy = 'always'
  retries = 10
  processes = ['worker']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
