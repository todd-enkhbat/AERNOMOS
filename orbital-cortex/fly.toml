# Fly.io config for the Orbital Cortex API.
# Deploy from the orbital-cortex directory: flyctl deploy --config fly.toml
# Secrets (set via `flyctl secrets set`): DATABASE_URL, REDIS_URL,
# CORS_ORIGINS, SENTRY_DSN, S3_* / ARTIFACT_SIGNING_SECRET, APP_ENV=production.

app = "orbital-cortex-api"
primary_region = "ewr"

[build]
  dockerfile = "apps/api/Dockerfile"

[deploy]
  release_command = "alembic upgrade head"

[env]
  APP_ENV = "production"
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/readyz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

# Worker process (ARQ). Scale with: flyctl scale count worker=1
[processes]
  app = "uvicorn app.main:app --host 0.0.0.0 --port 8000"
  worker = "arq app.workers.executor.WorkerSettings"
