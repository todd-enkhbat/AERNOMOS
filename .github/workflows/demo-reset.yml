name: demo-reset

# Nightly reseed of the hosted demo to a clean canned state.
# Deletes visitor-submitted jobs only (is_example=false), then reseeds
# reference data and upserts curated example missions. Curated example
# missions and curated example jobs are never deleted by this workflow.

on:
  schedule:
    - cron: "0 6 * * *" # 06:00 UTC nightly
  workflow_dispatch:

jobs:
  reset:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DEMO_DATABASE_URL }}
      APP_ENV: production
    steps:
      - uses: actions/checkout@v4

      - name: Skip when demo database is not configured
        id: gate
        run: |
          if [ -n "$DATABASE_URL" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "DEMO_DATABASE_URL not configured; skipping reset."
          fi

      - uses: actions/setup-python@v5
        if: steps.gate.outputs.enabled == 'true'
        with:
          python-version: "3.12"
          cache: pip

      - name: Install API deps
        if: steps.gate.outputs.enabled == 'true'
        working-directory: orbital-cortex/apps/api
        run: pip install -r requirements.txt

      - name: Reset visitor jobs and reseed curated examples
        if: steps.gate.outputs.enabled == 'true'
        working-directory: orbital-cortex/apps/api
        run: python -m app.seed --reset --force

      # Accelerator demos (Phase R): optional one-command reseeds for pitch
      # rehearsal. Default uses pinned STAC fixtures (no live PC dependency).
      # Uncomment to keep hosted demo DB primed with demos 1–3:
      #   python -m app.seed --demo=1 --reset
      #   python -m app.seed --demo=2 --reset
      #   python -m app.seed --demo=3 --reset
      # Local / CI rehearsal (no DEMO_DATABASE_URL required):
      #   python -m pytest tests/test_accelerator_demos_phase_r.py -q
